services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: clinicflow-cloudflared
    restart: unless-stopped
    command:
      - tunnel
      - --no-autoupdate
      - --url
      - ${CLOUDFLARE_TUNNEL_URL:-http://clinicflow-app:3001}
    networks:
      - clinicflow-public

networks:
  clinicflow-public:
    external: true

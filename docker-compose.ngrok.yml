services:
  ocs-medecins:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocs-medecins
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_PATH: /data/clinic.db
      TZ: ${TZ:-Indian/Mauritius}
    ports:
      - "${APP_PORT:-8080}:3001"
    volumes:
      - ./nas-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ocs-ngrok
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: ["http", "ocs-medecins:3001"]
    depends_on:
      - ocs-medecins

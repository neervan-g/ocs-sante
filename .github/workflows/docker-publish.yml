name: Publish Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify Docker Hub secrets
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::Set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repository secrets."
            exit 1
          fi

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Set up Buildx
        run: |
          docker buildx create --name ocs-builder --use 2>/dev/null || docker buildx use ocs-builder

      - name: Build and push main image (linux/amd64 for NAS)
        env:
          IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/clinicflow
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          docker buildx build \
            --platform linux/amd64 \
            --file ./Dockerfile \
            --tag "${IMAGE}:latest" \
            --tag "${IMAGE}:sha-${SHORT_SHA}" \
            --push \
            .

      - name: Smoke test published main image boots
        env:
          IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/clinicflow:latest
        run: |
          docker pull "${IMAGE}"
          cid="$(docker run -d --rm -e NODE_ENV=production -e DB_PATH=/tmp/smoke.db "${IMAGE}")"
          trap 'docker stop "${cid}" >/dev/null 2>&1 || true' EXIT
          for attempt in $(seq 1 30); do
            if docker exec "${cid}" node -e "fetch('http://127.0.0.1:3001/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"; then
              exit 0
            fi
            sleep 2
          done
          echo "::error::API did not become healthy after image pull"
          docker logs "${cid}" || true
          exit 1

      - name: Build and push patient portal image
        env:
          IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/clinicflow-patient-portal
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          docker buildx build \
            --platform linux/amd64 \
            --file ./patient-portal.Dockerfile \
            --tag "${IMAGE}:latest" \
            --tag "${IMAGE}:sha-${SHORT_SHA}" \
            --push \
            .

      - name: Build and push linkham portal image
        env:
          IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/clinicflow-linkham-portal
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          docker buildx build \
            --platform linux/amd64 \
            --file ./linkham-portal.Dockerfile \
            --tag "${IMAGE}:latest" \
            --tag "${IMAGE}:sha-${SHORT_SHA}" \
            --push \
            .

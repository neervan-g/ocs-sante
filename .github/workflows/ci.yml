name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-tests:
    name: Server tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install server dependencies
        working-directory: server
        run: npm ci
      - name: Run API integration tests
        working-directory: server
        run: npm test

  client-build:
    name: Staff portal lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        working-directory: client
        run: npm ci
      - name: Lint
        working-directory: client
        run: npm run lint --if-present
      - name: Build
        working-directory: client
        run: npm run build

  patient-portal-build:
    name: Patient portal lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: patient-portal/package-lock.json
      - name: Install dependencies
        working-directory: patient-portal
        run: npm ci
      - name: Lint
        working-directory: patient-portal
        run: npm run lint --if-present
      - name: Build
        working-directory: patient-portal
        run: npm run build

  e2e-smoke:
    name: Playwright smoke tests
    runs-on: ubuntu-latest
    needs: [server-tests, client-build, patient-portal-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            client/package-lock.json
            patient-portal/package-lock.json
      - name: Install root dependencies
        run: npm ci
      - name: Install workspace dependencies
        run: |
          npm ci --prefix server
          npm ci --prefix client
          npm ci --prefix patient-portal
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Build frontends for preview
        run: npm run build:e2e
      - name: Run Playwright smoke tests
        run: npm run test:e2e
        env:
          CI: "true"
          E2E_DB_PATH: /tmp/ocs-e2e-ci.db
          CLIENT_ORIGINS: "http://127.0.0.1:4173,http://127.0.0.1:4174,http://localhost:4173,http://localhost:4174"

services:
  app:
    image: docker.io/${DOCKERHUB_USERNAME:-your-dockerhub-username}/${APP_IMAGE_NAME:-clinicflow}:${APP_IMAGE_TAG:-latest}
    container_name: clinicflow-app
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3001
      DB_PATH: /data/clinic.db
      # Full billing + inventory integration requires SQLite (createApp). Do not set DATABASE_URL here.
      USE_POSTGRES: "false"
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:support@ocs.local}
      SEED_OCS_MASTER_STOCK: ${SEED_OCS_MASTER_STOCK:-false}
      SEED_DOCTOR_STOCK_FROM_OCS: ${SEED_DOCTOR_STOCK_FROM_OCS:-false}
      TZ: ${TZ:-Indian/Mauritius}
    ports:
      - "${APP_PORT:-8080}:3001"
    volumes:
      - clinicflow-data:/data
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/health').then(async (res)=>{if(!res.ok)process.exit(1);const b=await res.json();process.exit(b.mode==='sqlite'&&b.features?.inventory?0:1)}).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - clinicflow-public

  patient-portal:
    image: docker.io/${DOCKERHUB_USERNAME:-your-dockerhub-username}/clinicflow-patient-portal:${APP_IMAGE_TAG:-latest}
    container_name: clinicflow-patient-portal
    restart: unless-stopped
    depends_on:
      - app
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    networks:
      - clinicflow-public

  linkham-portal:
    image: docker.io/${DOCKERHUB_USERNAME:-your-dockerhub-username}/clinicflow-linkham-portal:${APP_IMAGE_TAG:-latest}
    container_name: clinicflow-linkham-portal
    restart: unless-stopped
    depends_on:
      - app
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    networks:
      - clinicflow-public

  watchtower:
    image: containrrr/watchtower:latest
    container_name: clinicflow-watchtower
    restart: unless-stopped
    command:
      - --interval
      - ${WATCHTOWER_POLL_INTERVAL:-300}
      - --cleanup
      - --label-enable
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      TZ: ${TZ:-Indian/Mauritius}
    networks:
      - clinicflow-public

volumes:
  clinicflow-data:
    name: clinicflow-data

networks:
  clinicflow-public:
    name: clinicflow-public
